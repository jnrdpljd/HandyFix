<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clients — HandyFix Admin</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .clients-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
    .client-card { background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius-lg); padding:18px; transition:all var(--transition); }
    .client-card:hover { border-color:var(--border); box-shadow:var(--shadow-sm); }
    .cl-av { width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#333,#1a1a1a);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--gold);border:2px solid var(--gold-border);flex-shrink:0; }
    .cl-stat { text-align:center;padding:8px;background:var(--surface-2);border-radius:var(--radius);border:1px solid var(--border-soft);flex:1; }
    .cl-stat-val { font-size:16px;font-weight:700;color:var(--text-primary); }
    .cl-stat-lbl { font-size:9.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="portal-layout">
  <main class="main-content" id="mainContent">
    <header class="top-header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <div><div class="page-title">Clients</div><div class="breadcrumb">View and manage registered clients</div></div>
      </div>
      <div class="header-right">
        <div class="header-chip" id="headerDate">—</div>
        <button class="theme-toggle-btn">☀️</button>
        <div class="search-wrap"><span class="s-icon">🔍</span><input type="text" id="clSearch" placeholder="Search clients…" oninput="debounceLoad()"/></div>
      </div>
    </header>

    <div class="page-content">
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px">
        <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value" id="sTotal">0</div><div class="stat-label">Total Clients</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" id="sActive">0</div><div class="stat-label">Active</div></div>
        <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-value" id="sBookings">0</div><div class="stat-label">Total Bookings</div></div>
        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value" id="sRevenue">₱0</div><div class="stat-label">Total Revenue</div></div>
      </div>

      <div class="section-header mb-4">
        <div class="section-title" id="clientCount">All Clients</div>
        <div style="display:flex;gap:8px">
          <select class="form-input" id="clStatusFilter" style="width:140px;padding:7px 10px" onchange="loadClients()">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="suspended">Suspended</option>
          </select>
          <button class="btn btn-secondary btn-sm" onclick="exportClients()">⬇ Export CSV</button>
        </div>
      </div>

      <div class="clients-grid" id="clientsGrid"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="clientModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title">Client Profile</div>
      <button class="modal-close" onclick="closeModal('clientModal')">✕</button>
    </div>
    <div id="clientModalBody" style="max-height:70vh;overflow-y:auto"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('clientModal')">Close</button>
      <button class="btn btn-danger btn-sm" id="suspendBtn">⛔ Suspend</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="shared.js"></script>
<script src="admin_sidebar.js"></script>
<script>
let clients = [];
const debounceLoad = HF.debounce(() => loadClients(), 300);

document.addEventListener('DOMContentLoaded', async () => {
  buildAdminSidebar('admin_clients.html');
  await HF.checkAuth();
  loadClients();
});

async function loadClients() {
  const q      = document.getElementById('clSearch')?.value || '';
  const status = document.getElementById('clStatusFilter')?.value || '';
  document.getElementById('clientsGrid').innerHTML = HF.loadingHTML();

  try {
    const params = new URLSearchParams({ q, status });
    clients = await HF.apiFetch('api/clients.php?' + params);
    renderClients();
    updateStats();
  } catch(e) {
    HF.showToast('Failed to load clients', 'error');
    document.getElementById('clientsGrid').innerHTML = HF.emptyState('👥', 'Failed to load clients');
  }
}

function updateStats() {
  document.getElementById('sTotal').textContent   = clients.length;
  document.getElementById('sActive').textContent  = clients.filter(c => c.status === 'active').length;
  const totalBookings = clients.reduce((s,c) => s + (parseInt(c.total_bookings)||0), 0);
  const totalRevenue  = clients.reduce((s,c) => s + (parseFloat(c.total_spent)||0), 0);
  document.getElementById('sBookings').textContent = totalBookings;
  document.getElementById('sRevenue').textContent  = totalRevenue >= 1000
    ? '₱' + Math.round(totalRevenue/1000) + 'K'
    : HF.formatCurrency(totalRevenue);
}

function renderClients() {
  document.getElementById('clientCount').textContent = `${clients.length} Client${clients.length!==1?'s':''}`;
  const grid = document.getElementById('clientsGrid');
  if (!clients.length) {
    grid.innerHTML = `<div style="grid-column:1/-1">${HF.emptyState('👥','No clients found','Clients will appear here once they register and book a service')}</div>`;
    return;
  }
  
  // FIX: Safely parse dates to prevent crashing
  grid.innerHTML = clients.map(c => {
    const safeDate = c.created_at ? c.created_at.replace(' ', 'T') : null;
    return `
    <div class="client-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div class="cl-av">${c.initials||'?'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;color:var(--text-primary)">${HF.escapeHtml(c.name)}</div>
          <div style="font-size:11.5px;color:var(--text-muted);margin-top:1px">${HF.escapeHtml(c.email)}</div>
          <div style="font-size:11px;color:var(--text-muted)">${HF.escapeHtml(c.phone||'—')}</div>
        </div>
        <span class="badge ${c.status==='active'?'badge-success':c.status==='suspended'?'badge-danger':'badge-muted'}">${c.status}</span>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div class="cl-stat">
          <div class="cl-stat-val">${c.total_bookings||0}</div>
          <div class="cl-stat-lbl">Bookings</div>
        </div>
        <div class="cl-stat">
          <div class="cl-stat-val">${parseFloat(c.total_spent||0)>=1000?'₱'+Math.round(c.total_spent/1000)+'K':HF.formatCurrency(c.total_spent||0).replace('.00','')}</div>
          <div class="cl-stat-lbl">Spent</div>
        </div>
        <div class="cl-stat">
          <div class="cl-stat-val" style="font-size:11px">${safeDate ? HF.formatDate(safeDate).split(',')[0] : '—'}</div>
          <div class="cl-stat-lbl">Joined</div>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm w-full" onclick="viewClient(${c.id})">👁 View Details</button>
    </div>`;
  }).join('');
}

async function viewClient(id) {
  const el = document.getElementById('clientModalBody');
  el.innerHTML = HF.loadingHTML();
  openModal('clientModal');

  try {
    const c = await HF.apiFetch(`api/clients.php?id=${id}`);
    
    // FIX: Safely parse joined date
    const safeJoined = c.created_at ? c.created_at.replace(' ', 'T') : null;
    
    el.innerHTML = `
      <div style="padding:0 0 16px">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
          <div class="cl-av" style="width:60px;height:60px;font-size:20px">${c.initials||'?'}</div>
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--text-primary)">${HF.escapeHtml(c.name)}</div>
            <span class="badge ${c.status==='active'?'badge-success':c.status==='suspended'?'badge-danger':'badge-muted'}">${c.status}</span>
          </div>
        </div>
        ${[
          ['📧 Email',c.email],
          ['📱 Phone',c.phone||'—'],
          ['📍 Address',c.address||'—'],
          ['📋 Total Bookings',c.total_bookings||0],
          ['💰 Total Spent',HF.formatCurrency(c.total_spent||0)],
          ['📅 Joined', safeJoined ? HF.formatDate(safeJoined) : '—'],
        ].map(([k,v])=>`
          <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-soft)">
            <span style="font-size:12px;color:var(--text-muted)">${k}</span>
            <span style="font-size:13px;font-weight:600;color:var(--text-primary)">${HF.escapeHtml(String(v))}</span>
          </div>`).join('')}
        ${c.bookings?.length ? `
          <div style="margin-top:16px">
            <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:10px">Recent Bookings</div>
            ${c.bookings.slice(0,5).map(b=>{
              // FIX: Safely parse booking schedule dates
              const safeSched = b.scheduled_date ? b.scheduled_date.replace(' ', 'T') : null;
              return `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius);margin-bottom:6px">
                <div>
                  <div style="font-size:12.5px;font-weight:600;color:var(--text-primary)">${HF.escapeHtml(b.service)}</div>
                  <div style="font-size:11px;color:var(--text-muted)">${HF.escapeHtml(b.booking_ref)} · ${safeSched?HF.formatDate(safeSched):'TBD'}</div>
                </div>
                <span class="badge ${{completed:'badge-success',pending:'badge-info',in_progress:'badge-warning',cancelled:'badge-danger',scheduled:'badge-warning'}[b.status]||'badge-muted'}">${b.status}</span>
              </div>`;
            }).join('')}
          </div>` : '<div style="margin-top:16px;font-size:12px;color:var(--text-dim);text-align:center">No bookings yet</div>'}
      </div>`;

    document.getElementById('suspendBtn').onclick = () => suspendClient(id, c.status);
    document.getElementById('suspendBtn').textContent = c.status === 'suspended' ? '✅ Reactivate' : '⛔ Suspend';
  } catch(e) {
    el.innerHTML = HF.emptyState('❌','Failed to load client details');
  }
}

async function suspendClient(id, currentStatus) {
  const action = currentStatus === 'suspended' ? 'reactivate' : 'suspend';
  if (!confirm(`${action.charAt(0).toUpperCase()+action.slice(1)} this client?`)) return;
  try {
    await HF.apiFetch(`api/clients.php?id=${id}&action=suspend`, 'PUT');
    HF.showToast('Client status updated.', 'success');
    closeModal('clientModal');
    loadClients();
  } catch(e) { HF.showToast(e.message,'error'); }
}

function exportClients() {
  if (!clients.length) { HF.showToast('No clients to export','info'); return; }
  const rows = [
    ['Name','Email','Phone','Address','Bookings','Total Spent','Status','Joined'],
    ...clients.map(c => [c.name,c.email,c.phone||'',c.address||'',c.total_bookings||0,c.total_spent||0,c.status,c.created_at])
  ];
  HF.exportCSV(rows, 'handyfix_clients.csv');
  HF.showToast('Clients exported!', 'success');
}
</script>
</body>
</html>
