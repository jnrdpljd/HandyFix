<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contractors — HandyFix Admin</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .contractors-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
    .con-card { background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius-lg); padding:18px; transition:all var(--transition); }
    .con-card:hover { border-color:var(--border); box-shadow:var(--shadow-sm); }
    .con-av { width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--maroon),var(--maroon-dark));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--gold);border:2px solid var(--gold-border);flex-shrink:0; }
    .con-stat { text-align:center;padding:8px;background:var(--surface-2);border-radius:var(--radius);border:1px solid var(--border-soft);flex:1; }
    .con-stat-val { font-size:16px;font-weight:700;color:var(--text-primary); }
    .con-stat-lbl { font-size:9.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="portal-layout">
  <main class="main-content" id="mainContent">
    <header class="top-header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <div><div class="page-title">Contractors</div><div class="breadcrumb">Manage registered contractors</div></div>
      </div>
      <div class="header-right">
        <div class="header-chip" id="headerDate">—</div>
        <button class="theme-toggle-btn">☀️</button>
        <div class="search-wrap"><span class="s-icon">🔍</span><input type="text" id="conSearch" placeholder="Search contractors…" oninput="debounceLoad()"/></div>
      </div>
    </header>

    <div class="page-content">
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px">
        <div class="stat-card"><div class="stat-icon">🔧</div><div class="stat-value" id="sTotal">0</div><div class="stat-label">Total Contractors</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" id="sAvail">0</div><div class="stat-label">Available</div></div>
        <div class="stat-card"><div class="stat-icon">🔄</div><div class="stat-value" id="sBusy">0</div><div class="stat-label">Busy</div></div>
        <div class="stat-card"><div class="stat-icon">✔️</div><div class="stat-value" id="sVerified">0</div><div class="stat-label">Verified</div></div>
      </div>

      <div class="section-header mb-4">
        <div class="section-title" id="conCount">All Contractors</div>
        <div style="display:flex;gap:8px">
          <select class="form-input" id="tradeFilter" style="width:150px;padding:7px 10px" onchange="loadContractors()">
            <option value="">All Trades</option>
            <option>Electrical</option><option>Plumbing</option>
            <option>Carpentry</option><option>Home Maintenance</option>
            <option>Painting</option><option>HVAC</option>
          </select>
          <select class="form-input" id="availFilter" style="width:140px;padding:7px 10px" onchange="loadContractors()">
            <option value="">All Status</option>
            <option value="available">Available</option>
            <option value="busy">Busy</option>
            <option value="off">Off</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="openAddModal()">➕ Add Contractor</button>
        </div>
      </div>

      <div class="contractors-grid" id="contractorsGrid"></div>
    </div>
  </main>
</div>

<!-- Add/Edit Contractor Modal -->
<div class="modal-overlay" id="conModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title" id="conModalTitle">Add Contractor</div>
      <button class="modal-close" onclick="closeModal('conModal')">✕</button>
    </div>
    <div style="padding:4px 0 16px;display:grid;gap:12px" id="conModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('conModal')">Cancel</button>
      <button class="btn btn-primary" id="conSaveBtn">Save</button>
    </div>
  </div>
</div>

<!-- View Contractor Modal -->
<div class="modal-overlay" id="conViewModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div class="modal-title">Contractor Profile</div>
      <button class="modal-close" onclick="closeModal('conViewModal')">✕</button>
    </div>
    <div id="conViewBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('conViewModal')">Close</button>
      <button class="btn btn-success btn-sm" id="verifyBtn">✔ Verify</button>
      <button class="btn btn-danger btn-sm" id="deleteConBtn">🗑 Delete</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="shared.js"></script>
<script src="admin_sidebar.js"></script>
<script>
let contractors = [];
let editingId   = null;

const debounceLoad = HF.debounce(() => loadContractors(), 300);

document.addEventListener('DOMContentLoaded', async () => {
  buildAdminSidebar('admin_contractors.html');
  await HF.checkAuth();
  loadContractors();
});

async function loadContractors() {
  const q     = document.getElementById('conSearch')?.value || '';
  const trade = document.getElementById('tradeFilter')?.value || '';
  const avail = document.getElementById('availFilter')?.value || '';
  document.getElementById('contractorsGrid').innerHTML = HF.loadingHTML();

  try {
    const params = new URLSearchParams({ q, trade, avail });
    contractors = await HF.apiFetch('api/contractors.php?' + params);
    renderContractors();
    updateStats();
  } catch(e) {
    HF.showToast('Failed to load contractors', 'error');
    document.getElementById('contractorsGrid').innerHTML = HF.emptyState('🔧','Failed to load');
  }
}

function updateStats() {
  document.getElementById('sTotal').textContent   = contractors.length;
  document.getElementById('sAvail').textContent   = contractors.filter(c=>c.availability==='available').length;
  document.getElementById('sBusy').textContent    = contractors.filter(c=>c.availability==='busy').length;
  document.getElementById('sVerified').textContent= contractors.filter(c=>parseInt(c.verified)).length;
}

const AVAIL_BADGE = { available:'badge-success', busy:'badge-warning', off:'badge-muted' };

function renderContractors() {
  document.getElementById('conCount').textContent = `${contractors.length} Contractor${contractors.length!==1?'s':''}`;
  const grid = document.getElementById('contractorsGrid');
  if (!contractors.length) {
    grid.innerHTML = `<div style="grid-column:1/-1">${HF.emptyState('🔧','No contractors yet','Click "Add Contractor" to register the first one')}</div>`;
    return;
  }
  grid.innerHTML = contractors.map(c => `
    <div class="con-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div class="con-av">${c.initials||'?'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:6px">
            ${HF.escapeHtml(c.name)}
            ${parseInt(c.verified)?'<span style="font-size:11px;color:#22c55e">✔</span>':''}
          </div>
          <div style="font-size:11.5px;color:var(--text-muted)">${HF.escapeHtml(c.trade||'')} ${c.experience?'· '+c.experience+'yr':''}</div>
          <div style="font-size:11px;color:var(--text-muted)">${HF.escapeHtml(c.email||'')}</div>
        </div>
        <span class="badge ${AVAIL_BADGE[c.availability]||'badge-muted'}">${c.availability}</span>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div class="con-stat"><div class="con-stat-val">${c.jobs_completed||0}</div><div class="con-stat-lbl">Jobs</div></div>
        <div class="con-stat"><div class="con-stat-val">${parseFloat(c.rating||0).toFixed(1)}⭐</div><div class="con-stat-lbl">Rating</div></div>
        <div class="con-stat"><div class="con-stat-val">${c.daily_rate>0?'₱'+Number(c.daily_rate).toLocaleString():'—'}</div><div class="con-stat-lbl">Day Rate</div></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" style="flex:1" onclick="viewContractor(${c.id})">👁 View</button>
        <button class="btn btn-primary btn-sm" style="flex:1" onclick="openEditModal(${c.id})">✏️ Edit</button>
      </div>
    </div>`).join('');
}

/* ─── Add / Edit Modal ─────────────────────────────────────── */
function formFields(c={}) {
  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label class="form-label">Full Name *</label><input class="form-input w-full" id="fName" value="${HF.escapeHtml(c.name||'')}" placeholder="Juan dela Cruz"/></div>
      <div><label class="form-label">Email *</label><input class="form-input w-full" id="fEmail" type="email" value="${HF.escapeHtml(c.email||'')}" placeholder="juan@example.com"/></div>
      ${!c.id?`<div><label class="form-label">Password *</label><input class="form-input w-full" id="fPass" type="password" placeholder="Min 8 chars"/></div>`:''}
      <div><label class="form-label">Trade *</label>
        <select class="form-input w-full" id="fTrade">
          ${['Electrical','Plumbing','Carpentry','Home Maintenance','Painting','HVAC','Tiling','Welding']
            .map(t=>`<option ${c.trade===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div><label class="form-label">Phone</label><input class="form-input w-full" id="fPhone" value="${HF.escapeHtml(c.phone||'')}" placeholder="+63 9XX XXX XXXX"/></div>
      <div><label class="form-label">Address / Area</label><input class="form-input w-full" id="fAddress" value="${HF.escapeHtml(c.address||'')}" placeholder="QC, Metro Manila"/></div>
      <div><label class="form-label">Experience (yrs)</label><input class="form-input w-full" id="fExp" type="number" min="0" value="${c.experience||0}"/></div>
      <div><label class="form-label">Daily Rate (₱)</label><input class="form-input w-full" id="fRate" type="number" min="0" value="${c.daily_rate||0}"/></div>
    </div>
    <div><label class="form-label">Specialization</label><input class="form-input w-full" id="fSpec" value="${HF.escapeHtml(c.specialization||'')}" placeholder="e.g. Commercial electrical, solar"/></div>
    <div><label class="form-label">Skills (comma-separated)</label><input class="form-input w-full" id="fSkills" value="${HF.escapeHtml(c.skills||'')}" placeholder="e.g. Wiring, Rewiring, Panel upgrade"/></div>
    <div><label class="form-label">Bio</label><textarea class="form-input w-full" id="fBio" rows="3" placeholder="Brief contractor description…">${HF.escapeHtml(c.bio||'')}</textarea></div>`;
}

function openAddModal() {
  editingId = null;
  document.getElementById('conModalTitle').textContent = 'Add Contractor';
  document.getElementById('conModalBody').innerHTML = formFields();
  document.getElementById('conSaveBtn').onclick = saveContractor;
  openModal('conModal');
}

function openEditModal(id) {
  const c = contractors.find(x => x.id == id);
  if (!c) return;
  editingId = id;
  document.getElementById('conModalTitle').textContent = 'Edit Contractor';
  document.getElementById('conModalBody').innerHTML = formFields(c);
  document.getElementById('conSaveBtn').onclick = saveContractor;
  openModal('conModal');
}

async function saveContractor() {
  const payload = {
    name:          document.getElementById('fName')?.value.trim(),
    email:         document.getElementById('fEmail')?.value.trim(),
    password:      document.getElementById('fPass')?.value || undefined,
    trade:         document.getElementById('fTrade')?.value,
    phone:         document.getElementById('fPhone')?.value.trim(),
    address:       document.getElementById('fAddress')?.value.trim(),
    experience:    parseInt(document.getElementById('fExp')?.value||0),
    daily_rate:    parseFloat(document.getElementById('fRate')?.value||0),
    specialization:document.getElementById('fSpec')?.value.trim(),
    skills:        document.getElementById('fSkills')?.value.trim(),
    bio:           document.getElementById('fBio')?.value.trim(),
  };

  if (!payload.name || !payload.email || !payload.trade) {
    HF.showToast('Name, email and trade are required', 'warning'); return;
  }
  if (!editingId && !payload.password) {
    HF.showToast('Password is required for new contractor', 'warning'); return;
  }

  try {
    if (editingId) {
      await HF.apiFetch(`api/contractors.php?id=${editingId}`, 'PUT', payload);
      HF.showToast('Contractor updated!', 'success');
    } else {
      await HF.apiFetch('api/contractors.php', 'POST', payload);
      HF.showToast('Contractor added!', 'success');
    }
    closeModal('conModal');
    loadContractors();
  } catch(e) {
    HF.showToast(e.message || 'Save failed', 'error');
  }
}

function viewContractor(id) {
  const c = contractors.find(x => x.id == id);
  if (!c) return;
  document.getElementById('conViewBody').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div class="con-av" style="width:60px;height:60px;font-size:20px">${c.initials||'?'}</div>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--text-primary)">${HF.escapeHtml(c.name)}</div>
        <div style="display:flex;gap:6px;margin-top:4px">
          <span class="badge ${AVAIL_BADGE[c.availability]||'badge-muted'}">${c.availability}</span>
          ${parseInt(c.verified)?'<span class="badge badge-success">Verified ✔</span>':'<span class="badge badge-muted">Unverified</span>'}
        </div>
      </div>
    </div>
    ${[
      ['🛠️ Trade',c.trade],
      ['📧 Email',c.email],
      ['📱 Phone',c.phone||'—'],
      ['📍 Area',c.address||'—'],
      ['💼 Experience',c.experience?(c.experience+' years'):'—'],
      ['💰 Daily Rate',c.daily_rate>0?HF.formatCurrency(c.daily_rate):'—'],
      ['⭐ Rating',parseFloat(c.rating||0).toFixed(1)+' ('+( c.total_reviews||0)+' reviews)'],
      ['✅ Jobs Done',c.jobs_completed||0],
      ['🔑 Skills',c.skills||'—'],
    ].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-soft)">
      <span style="font-size:12px;color:var(--text-muted)">${k}</span>
      <span style="font-size:13px;font-weight:600;color:var(--text-primary);text-align:right;max-width:60%">${HF.escapeHtml(String(v))}</span>
    </div>`).join('')}
    ${c.bio?`<div style="margin-top:12px;font-size:12.5px;color:var(--text-secondary);line-height:1.6">${HF.escapeHtml(c.bio)}</div>`:''}`;

  document.getElementById('verifyBtn').onclick  = () => verifyContractor(c.id);
  document.getElementById('deleteConBtn').onclick = () => deleteContractor(c.id);
  document.getElementById('verifyBtn').style.display = parseInt(c.verified) ? 'none' : '';
  openModal('conViewModal');
}

async function verifyContractor(id) {
  try {
    await HF.apiFetch(`api/contractors.php?id=${id}&action=verify`, 'PUT');
    HF.showToast('Contractor verified!', 'success');
    closeModal('conViewModal');
    loadContractors();
  } catch(e) { HF.showToast(e.message,'error'); }
}

async function deleteContractor(id) {
  if (!confirm('Delete this contractor? This cannot be undone.')) return;
  try {
    await HF.apiFetch(`api/contractors.php?id=${id}`, 'DELETE');
    HF.showToast('Contractor deleted.', 'warning');
    closeModal('conViewModal');
    loadContractors();
  } catch(e) { HF.showToast(e.message,'error'); }
}
</script>
</body>
</html>
