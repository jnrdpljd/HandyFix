<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages — HandyFix Admin</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .messages-layout { display:flex; height:calc(100vh - var(--header-h)); overflow:hidden; }
    .contacts-panel { width:300px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0; }
    .contacts-header { padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0; }
    .contacts-title { font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between; }
    .contacts-list { flex:1;overflow-y:auto;padding:6px; }
    .contact-item { display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:var(--radius);cursor:pointer;transition:all var(--transition);border:1px solid transparent;margin-bottom:2px; }
    .contact-item:hover { background:var(--surface-2);border-color:var(--border); }
    .contact-item.active { background:linear-gradient(135deg,rgba(107,5,4,0.45),rgba(107,5,4,0.22));border-color:rgba(230,175,46,0.22); }
    .con-av { width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold);border:1.5px solid var(--gold-border);flex-shrink:0; }
    .con-av.client { background:linear-gradient(135deg,#333,#1a1a1a); }
    .con-av.contractor { background:linear-gradient(135deg,var(--maroon),var(--maroon-dark)); }
    .con-av.admin { background:linear-gradient(135deg,#1e3a5f,#0f2040); }
    .unread-dot { width:8px;height:8px;border-radius:50%;background:var(--maroon);flex-shrink:0; }
    .chat-panel { flex:1;display:flex;flex-direction:column;background:var(--off-black); }
    .chat-empty { flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center;padding:40px; }
    .chat-header { display:none;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0; }
    .chat-header.visible { display:flex; }
    .messages-area { display:none;flex:1;overflow-y:auto;padding:20px;flex-direction:column;gap:14px; }
    .messages-area.visible { display:flex; }
    .msg-row { display:flex;align-items:flex-end;gap:8px;max-width:70%; }
    .msg-row.sent { align-self:flex-end;flex-direction:row-reverse; }
    .msg-row.received { align-self:flex-start; }
    .msg-av { width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0; }
    .msg-bubble { padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word; }
    .msg-row.received .msg-bubble { background:var(--surface-2);border:1px solid var(--border-soft);color:var(--text-primary);border-radius:14px 14px 14px 4px; }
    .msg-row.sent .msg-bubble { background:linear-gradient(135deg,var(--maroon),var(--maroon-dark));color:#fff;border-radius:14px 14px 4px 14px; }
    .msg-time { font-size:10px;color:var(--text-dim);padding:0 4px; }
    .chat-input-bar { display:none;padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0; }
    .chat-input-bar.visible { display:flex;gap:10px;align-items:flex-end; }
    .input-wrap { flex:1;display:flex;align-items:center;background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;padding:8px 12px;transition:border-color var(--transition); }
    .input-wrap:focus-within { border-color:var(--gold); }
    #adminChatInput { flex:1;background:none;border:none;color:var(--text-primary);font-size:13.5px;outline:none;resize:none;max-height:100px;min-height:22px; }
    .send-btn { width:38px;height:38px;background:var(--maroon);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;transition:all var(--transition);border:none; }
    .send-btn:hover { background:var(--maroon-light);transform:scale(1.05); }
    .role-chip { padding:2px 8px;border-radius:99px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px; }
    .role-chip.client { background:rgba(129,140,248,0.15);color:#818cf8; }
    .role-chip.contractor { background:var(--gold-dim);color:var(--gold); }
    .msg-date-sep { text-align:center; }
    .msg-date-sep span { font-size:10.5px;color:var(--text-muted);background:var(--off-black);padding:2px 10px;border:1px solid var(--border-soft);border-radius:99px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="portal-layout">
  <main class="main-content" id="mainContent">
    <header class="top-header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <div><div class="page-title">Messages</div><div class="breadcrumb">Admin communication center</div></div>
      </div>
      <div class="header-right">
        <button class="theme-toggle-btn">☀️</button>
      </div>
    </header>

    <div class="messages-layout">
      <!-- Contacts -->
      <div class="contacts-panel">
        <div class="contacts-header">
          <div class="contacts-title">
            Conversations
            <span class="badge badge-maroon" id="unreadBadge" style="display:none">0</span>
          </div>
          <div style="position:relative">
            <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px">🔍</span>
            <input type="text" style="width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:9px;padding:8px 10px 8px 32px;color:var(--text-primary);font-size:12.5px;outline:none"
              placeholder="Search…" id="conSearch" oninput="filterContacts()"/>
          </div>
        </div>
        <div class="contacts-list" id="contactsList">
          <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">Loading…</div>
        </div>
      </div>

      <!-- Chat -->
      <div class="chat-panel">
        <div class="chat-empty" id="chatEmpty">
          <div style="font-size:54px;opacity:0.2">💬</div>
          <div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--text-muted)">Select a Conversation</div>
          <div style="font-size:13px;color:var(--text-dim)">Communicate with clients and contractors</div>
        </div>
        <div class="chat-header" id="chatHeader">
          <div style="display:flex;align-items:center;gap:12px">
            <div id="chatHeaderAv" class="con-av client" style="width:38px;height:38px;font-size:13px">?</div>
            <div>
              <div style="font-size:14px;font-weight:600;color:var(--text-primary)" id="chatHeaderName">—</div>
              <div id="chatHeaderRole" style="font-size:11px;color:var(--text-muted)">—</div>
            </div>
          </div>
          <button class="hdr-btn" onclick="HF.showToast('Call feature coming soon','info')" title="Call">📞</button>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="chat-input-bar" id="chatInputBar">
          <div class="input-wrap">
            <textarea id="adminChatInput" rows="1" placeholder="Type a message…"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          </div>
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<script src="shared.js"></script>
<script src="admin_sidebar.js"></script>
<script>
let conversations = [];
let activeUserId  = null;
let myUserId      = null;
let pollInterval  = null;

document.addEventListener('DOMContentLoaded', async () => {
  buildAdminSidebar('admin_messages.html');
  const user = await HF.checkAuth();
  myUserId = user?.id;
  loadConversations();
  // Poll every 15s for new messages
  pollInterval = setInterval(() => {
    loadConversations(true);
    if (activeUserId) loadThread(activeUserId, true);
  }, 15000);
});

async function loadConversations(silent = false) {
  try {
    conversations = await HF.apiFetch('api/messages.php?action=conversations');
    renderContacts(conversations);
    updateUnreadBadge();
  } catch(e) {
    if (!silent) document.getElementById('contactsList').innerHTML =
      '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">No conversations yet</div>';
  }
}

function renderContacts(list) {
  const q = document.getElementById('conSearch')?.value.toLowerCase() || '';
  const filtered = q ? list.filter(c => c.name.toLowerCase().includes(q) || c.last_msg.toLowerCase().includes(q)) : list;

  if (!filtered.length) {
    document.getElementById('contactsList').innerHTML =
      '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">No conversations yet.<br>Conversations appear when clients or contractors message you.</div>';
    return;
  }

  document.getElementById('contactsList').innerHTML = filtered.map(c => `
    <div class="contact-item ${c.user_id==activeUserId?'active':''}" onclick="openConvo(${c.user_id})">
      <div class="con-av ${c.role}">${c.initials}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
          <span style="font-size:13px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${HF.escapeHtml(c.name)}</span>
          <span style="font-size:10px;color:var(--text-muted);white-space:nowrap">${formatMsgTime(c.last_time)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
          <span class="role-chip ${c.role}">${c.role}</span>
        </div>
        <div style="font-size:11.5px;color:${c.unread?'var(--text-secondary)':'var(--text-muted)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px">
          ${HF.escapeHtml(c.last_msg||'—')}
        </div>
      </div>
      ${c.unread ? '<div class="unread-dot"></div>' : ''}
    </div>`).join('');
}

function filterContacts() {
  renderContacts(conversations);
}

function formatMsgTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)    return 'now';
  if (diff < 3600)  return Math.floor(diff/60) + 'm';
  if (diff < 86400) return d.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});
  if (diff < 604800)return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  return d.toLocaleDateString('en-PH',{month:'short',day:'numeric'});
}

async function openConvo(userId) {
  activeUserId = userId;
  const c = conversations.find(x => x.user_id == userId);

  document.getElementById('chatEmpty').style.display = 'none';
  document.getElementById('chatHeader').classList.add('visible');
  document.getElementById('messagesArea').classList.add('visible');
  document.getElementById('chatInputBar').classList.add('visible');

  if (c) {
    document.getElementById('chatHeaderAv').textContent  = c.initials;
    document.getElementById('chatHeaderAv').className   = `con-av ${c.role}`;
    document.getElementById('chatHeaderName').textContent= c.name;
    document.getElementById('chatHeaderRole').innerHTML = `<span class="role-chip ${c.role}">${c.role}</span>`;
  }

  renderContacts(conversations); // update active state
  await loadThread(userId);
  setTimeout(() => document.getElementById('adminChatInput')?.focus(), 50);
}

async function loadThread(userId, silent = false) {
  const area = document.getElementById('messagesArea');
  if (!silent) area.innerHTML = HF.loadingHTML();

  try {
    const msgs = await HF.apiFetch(`api/messages.php?action=thread&with=${userId}`);
    // Mark as read
    await HF.apiFetch(`api/messages.php?action=read&with=${userId}`, 'PUT');

    // Update unread in local list
    const c = conversations.find(x => x.user_id == userId);
    if (c) c.unread = 0;
    updateUnreadBadge();
    renderContacts(conversations);

    renderMessages(msgs, userId);
  } catch(e) {
    if (!silent) area.innerHTML = HF.emptyState('💬','No messages yet','Send the first message below');
  }
}

function renderMessages(msgs, withUserId) {
  const area = document.getElementById('messagesArea');
  const c    = conversations.find(x => x.user_id == withUserId);
  if (!msgs.length) {
    area.innerHTML = HF.emptyState('💬','No messages yet','Start the conversation');
    return;
  }
  let lastDate = '', html = '';
  msgs.forEach(m => {
    const dateLabel = new Date(m.created_at).toLocaleDateString('en-PH',{weekday:'long',month:'long',day:'numeric'});
    if (dateLabel !== lastDate) {
      html += `<div class="msg-date-sep"><span>${dateLabel}</span></div>`;
      lastDate = dateLabel;
    }
    html += `<div class="msg-row ${m.from}">
      <div class="msg-av" style="background:${m.from==='me'?'linear-gradient(135deg,var(--maroon),var(--maroon-dark))':'linear-gradient(135deg,#333,#1a1a1a)'}">
        ${m.from==='me'?'AD':HF.escapeHtml(c?.initials||'?')}
      </div>
      <div>
        <div class="msg-bubble">${HF.escapeHtml(m.body)}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    </div>`;
  });
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('adminChatInput');
  const text  = input.value.trim();
  if (!text || !activeUserId) return;

  input.value = ''; input.style.height = 'auto';

  try {
    await HF.apiFetch('api/messages.php', 'POST', { receiver_id: activeUserId, body: text });
    await loadThread(activeUserId, true);
    await loadConversations(true);
  } catch(e) {
    HF.showToast('Failed to send message', 'error');
    input.value = text; // restore
  }
}

function updateUnreadBadge() {
  const total = conversations.reduce((s,c) => s + (parseInt(c.unread)||0), 0);
  const b = document.getElementById('unreadBadge');
  if (b) { b.textContent = total; b.style.display = total ? '' : 'none'; }
}

function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
</script>
</body>
</html>
