<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Services — HandyFix Client</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .services-filter { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .filter-chip { padding:7px 16px; border-radius:99px; border:1.5px solid var(--border-soft); font-size:12.5px; font-weight:600; color:var(--text-muted); cursor:pointer; transition:all var(--transition); }
    .filter-chip.active { border-color:var(--gold); background:var(--gold-dim); color:var(--gold); }
    .filter-chip:hover:not(.active) { border-color:var(--border); color:var(--text-secondary); }
    .service-tile { background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius-xl); overflow:hidden; transition:all var(--transition); cursor:pointer; display:flex; flex-direction:column; }
    .service-tile:hover { transform:translateY(-5px); box-shadow:var(--shadow-gold); border-color:var(--border); }
    .tile-banner { height:110px; display:flex; align-items:center; justify-content:center; font-size:52px; background:linear-gradient(135deg,rgba(107,5,4,0.3),rgba(230,175,46,0.08)); position:relative; overflow:hidden; }
    .tile-banner::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 60%,var(--surface) 100%); }
    .tile-body { padding:18px 20px; flex:1; display:flex; flex-direction:column; }
    .tile-category { font-size:10px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    .tile-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; color:var(--text-primary); margin-bottom:8px; }
    .tile-desc  { font-size:12.5px; color:var(--text-muted); line-height:1.6; flex:1; margin-bottom:14px; }
    .tile-meta  { display:flex; align-items:center; justify-content:space-between; }
    .tile-price { font-size:12px; font-weight:700; color:var(--gold); }
    .tile-time  { font-size:11px; color:var(--text-muted); }
    .services-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:18px; }
  </style>
</head>
<body>
<div class="portal-layout">
  <main class="main-content" id="mainContent">
    <header class="top-header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <div><div class="page-title">Services</div><div class="breadcrumb">Browse and book a service</div></div>
      </div>
      <div class="header-right" style="display:flex; align-items:center; gap:15px;">
        <div class="search-wrap">
          <span class="s-icon">🔍</span>
          <input type="text" placeholder="Search services…" id="serviceSearch" oninput="filterServices(this.value)"/>
        </div>
        <button class="theme-toggle-btn">☀️</button>
        
        <div class="notif-wrapper" style="position:relative; display:inline-block;">
          <div class="hdr-btn" onclick="toggleNotifications()" style="cursor:pointer; font-size: 20px;">🔔<span class="hdr-notif-dot" id="notifDot" style="display:none; position:absolute; top:-2px; right:-2px; background:var(--danger); width:8px; height:8px; border-radius:50%;"></span></div>
          <div id="notifDropdown" style="display:none; position:absolute; right:0; top:45px; width:320px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); box-shadow:0 10px 25px rgba(0,0,0,0.2); z-index:100; overflow:hidden; text-align:left;">
             <div style="padding:12px 16px; font-weight:700; border-bottom:1px solid var(--border-soft); background:var(--surface-2); font-size:14px; color:var(--text-primary);">Activity Log</div>
             <div id="notifList" style="max-height:300px; overflow-y:auto; padding:10px;">Loading...</div>
          </div>
        </div>
        
      </div>
    </header>

    <div class="page-content">
      <div class="services-filter" id="filterChips">
        <div class="filter-chip active" data-cat="All"              onclick="setFilter('All',this)">All Services</div>
        <div class="filter-chip" data-cat="Plumbing"               onclick="setFilter('Plumbing',this)">🔧 Plumbing</div>
        <div class="filter-chip" data-cat="Electrical"             onclick="setFilter('Electrical',this)">⚡ Electrical</div>
        <div class="filter-chip" data-cat="Carpentry"              onclick="setFilter('Carpentry',this)">🪚 Carpentry</div>
        <div class="filter-chip" data-cat="Home Maintenance"       onclick="setFilter('Home Maintenance',this)">🏠 Home Maintenance</div>
        <div class="filter-chip" data-cat="Tools"                  onclick="setFilter('Tools',this)">🔨 Tools</div>
      </div>
      <div class="services-grid" id="servicesGrid"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="bookModal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <div class="modal-title" id="bookModalTitle">Book Service</div>
      <button class="modal-close" onclick="closeModal('bookModal')">✕</button>
    </div>
    <form onsubmit="submitBooking(event)">
      <div class="form-group">
        <label class="form-label">Specific Need <span class="required">*</span></label>
        <textarea class="form-input" id="bookDesc" rows="3" placeholder="Describe what needs to be done…" required></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Preferred Date <span class="required">*</span></label>
          <input class="form-input" type="date" id="bookDate" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Preferred Time</label>
          <input class="form-input" type="time" id="bookTime" value="09:00"/>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Service Address <span class="required">*</span></label>
        <select class="form-input" id="bookAddress" required>
            <option value="">Loading addresses...</option>
        </select>
        <div style="text-align:right; margin-top:5px; font-size:12px;">
            <a href="client_profile.html" style="color:var(--gold); text-decoration:none;">+ Manage Addresses</a>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Additional Notes</label>
        <textarea class="form-input" id="bookNotes" rows="2" placeholder="Photos, special instructions…"></textarea>
      </div>
      <input type="hidden" id="bookServiceType"/>
      <div style="background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:var(--radius);padding:12px;margin-bottom:4px;font-size:12.5px;color:var(--text-muted)">
        💡 Booking goes to our admin who will assign the best available contractor for your job.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('bookModal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="bookBtn">Submit Request →</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="shared.js"></script>
<script src="client_sidebar.js"></script>
<script>
const SERVICES = [
  { id:1,  cat:'Plumbing',         emoji:'🔧', title:'Pipe Leak Repair',        desc:'Fix leaking pipes, joints, and connections before they cause further damage.',    price:'From ₱500',   time:'1–2 hrs' },
  { id:2,  cat:'Plumbing',         emoji:'🚰', title:'Drain Cleaning',          desc:'Remove blockages from sinks, toilets, and drainage systems professionally.',     price:'From ₱600',   time:'1–3 hrs' },
  { id:3,  cat:'Plumbing',         emoji:'🚿', title:'Water Heater Install',    desc:'Supply and install electric or gas water heaters in your home.',                 price:'From ₱2,500', time:'2–4 hrs' },
  { id:4,  cat:'Electrical',       emoji:'⚡', title:'Circuit Breaker Repair',  desc:'Diagnose and repair circuit breaker issues causing power outages.',             price:'From ₱800',   time:'1–2 hrs' },
  { id:5,  cat:'Electrical',       emoji:'💡', title:'Lighting Installation',   desc:'Install ceiling lights, LED strips, chandeliers, and outdoor lighting.',        price:'From ₱500',   time:'1–3 hrs' },
  { id:6,  cat:'Electrical',       emoji:'🔌', title:'Outlet & Switch Install', desc:'Add new outlets, USB ports, and smart switches anywhere in your home.',         price:'From ₱400',   time:'1–2 hrs' },
  { id:7,  cat:'Carpentry',        emoji:'🪚', title:'Cabinet Making',          desc:'Custom-built kitchen and bedroom cabinets tailored to your space.',              price:'From ₱3,000', time:'1–3 days' },
  { id:8,  cat:'Carpentry',        emoji:'🚪', title:'Door Repair & Install',   desc:'Fix stuck doors, replace hinges, or install new interior/exterior doors.',      price:'From ₱600',   time:'1–2 hrs' },
  { id:9,  cat:'Carpentry',        emoji:'🪵', title:'Flooring',               desc:'Hardwood, laminate, vinyl, and tile flooring installation.',                    price:'From ₱1,500', time:'1–2 days' },
  { id:10, cat:'Home Maintenance', emoji:'🎨', title:'Interior Painting',       desc:'Full interior room painting with premium paint and professional finish.',       price:'From ₱800',   time:'1 day' },
  { id:11, cat:'Home Maintenance', emoji:'❄️', title:'AC Service & Repair',    desc:'Clean, repair, and regas your air conditioning units.',                        price:'From ₱700',   time:'1–2 hrs' },
  { id:12, cat:'Home Maintenance', emoji:'🏠', title:'Roof Repair',             desc:'Fix leaks, replace damaged shingles, and weatherproof your roof.',              price:'From ₱1,500', time:'4–8 hrs' },
  { id:13, cat:'Tools',            emoji:'🔨', title:'Tool Rental (Daily)',      desc:'Rent power tools, ladders, drills, and equipment for your DIY projects.',      price:'From ₱200/day', time:'24 hrs' },
  { id:14, cat:'Tools',            emoji:'🪛', title:'Guided DIY Session',      desc:'Book a contractor as your guide while you do the work yourself.',               price:'From ₱400/hr', time:'As needed' },
];

let activeFilter = 'All';
let searchQuery  = '';

document.addEventListener('DOMContentLoaded', () => {
  buildClientSidebar('client_services.html');
  document.getElementById('bookDate').min = new Date().toISOString().split('T')[0];
  renderServices();
  loadNotifications(); // Fetch notifications on load
});

/* --- Notifications Logic --- */
async function loadNotifications() {
  const list = document.getElementById('notifList');
  const badge = document.getElementById('notifDot');
  try {
    const data = await hfFetch('api/client.php?action=notifications');
    if (data.length > 0) badge.style.display = 'block';
    
    list.innerHTML = data.length === 0 ? '<div style="text-align:center;padding:10px;color:var(--text-muted);font-size:13px;">No recent activity.</div>' : 
      data.map(n => `
        <div style="display:flex;gap:12px;padding:10px;border-bottom:1px solid var(--border-soft);">
            <div style="font-size:18px;">${n.icon||'🔔'}</div>
            <div>
                <div style="font-size:13px;font-weight:600;color:${n.color||'var(--text-primary)'}">${HF.escapeHtml(n.action)}</div>
                <div style="font-size:12px;color:var(--text-muted)">${HF.escapeHtml(n.detail)}</div>
            </div>
        </div>
    `).join('');
  } catch(e) { list.innerHTML = '<div style="color:var(--danger);padding:10px;font-size:13px;">Failed to load notifications.</div>'; }
}

function toggleNotifications() {
  const dd = document.getElementById('notifDropdown');
  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
  if(dd.style.display === 'block') document.getElementById('notifDot').style.display = 'none';
}

document.addEventListener('click', e => {
  if(!e.target.closest('.notif-wrapper')) {
    const dd = document.getElementById('notifDropdown');
    if(dd) dd.style.display = 'none';
  }
});

/* --- Services Logic --- */
function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderServices();
}
function filterServices(q) { searchQuery=q.toLowerCase(); renderServices(); }

function renderServices() {
  const grid = document.getElementById('servicesGrid');
  let list = SERVICES.filter(s =>
    (activeFilter==='All' || s.cat===activeFilter) &&
    (!searchQuery || s.title.toLowerCase().includes(searchQuery) || s.desc.toLowerCase().includes(searchQuery))
  );
  if (!list.length) {
    grid.innerHTML = HF.emptyState('🔍','No services found','Try a different search term');
    return;
  }
  grid.innerHTML = list.map(s => `
    <div class="service-tile" onclick="openBook('${HF.escapeHtml(s.cat)}','${HF.escapeHtml(s.title)}')">
      <div class="tile-banner">${s.emoji}</div>
      <div class="tile-body">
        <div class="tile-category">${s.cat}</div>
        <div class="tile-title">${s.title}</div>
        <div class="tile-desc">${s.desc}</div>
        <div class="tile-meta">
          <div class="tile-price">${s.price}</div>
          <div class="tile-time">⏱ ${s.time}</div>
        </div>
        <button class="btn btn-primary btn-sm w-full mt-4" onclick="event.stopPropagation();openBook('${HF.escapeHtml(s.cat)}','${HF.escapeHtml(s.title)}')">Book Now →</button>
      </div>
    </div>`).join('');
}

/* --- UPDATED Booking Flow --- */
async function openBook(cat, title) {
  document.getElementById('bookServiceType').value = cat;
  document.getElementById('bookModalTitle').textContent = `Book: ${title}`;
  document.getElementById('bookDesc').value = '';
  document.getElementById('bookNotes').value = '';
  
  // Fetch Address List when opening modal
  const addrSelect = document.getElementById('bookAddress');
  addrSelect.innerHTML = '<option value="">Loading addresses...</option>';
  openModal('bookModal');
  
  try {
      const addresses = await hfFetch('api/client.php?action=addresses');
      if(addresses.length === 0) {
          addrSelect.innerHTML = '<option value="">No addresses found. Please add one in Profile.</option>';
      } else {
          addrSelect.innerHTML = '<option value="">-- Choose a Saved Location --</option>' + 
            addresses.map(a => `<option value="${HF.escapeHtml(a.address)}">${HF.escapeHtml(a.label)}: ${HF.escapeHtml(a.address)}</option>`).join('');
      }
  } catch(e) { addrSelect.innerHTML = '<option value="">Error loading addresses</option>'; }
}

async function submitBooking(e) {
  e.preventDefault();
  const btn = document.getElementById('bookBtn');
  
  const addressVal = document.getElementById('bookAddress').value;
  if(!addressVal) {
      HF.showToast("Please select a valid address from the dropdown.", "error");
      return;
  }
  
  btn.textContent = 'Submitting…'; btn.disabled = true;

  try {
    await hfFetch('api/client.php?action=book', 'POST', {
      service:        document.getElementById('bookServiceType').value,
      description:    document.getElementById('bookDesc').value,
      scheduled_date: document.getElementById('bookDate').value,
      scheduled_time: document.getElementById('bookTime').value,
      address:        addressVal,
      notes:          document.getElementById('bookNotes').value,
    });
    closeModal('bookModal');
    HF.showToast('Booking submitted! Admin will assign a contractor soon.', 'success', 5000);
    e.target.reset();
  } catch(err) {
    HF.showToast(err.message || 'Booking failed', 'error');
  } finally {
    btn.textContent = 'Submit Request →'; btn.disabled = false;
  }
}
</script>
</body>
</html>
