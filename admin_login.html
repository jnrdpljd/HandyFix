<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — HandyFix</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--off-black); }
    .login-box { width:100%; max-width:400px; background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius-lg); padding:36px; box-shadow:var(--shadow-lg); }
    .login-logo { display:flex;align-items:center;gap:12px;margin-bottom:28px; }
    .login-logo .logo-mark { width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--maroon),var(--maroon-dark));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:var(--gold);letter-spacing:-0.5px; }
    .login-logo strong { font-family:'Playfair Display',serif;font-size:20px;color:var(--text-primary); }
    .login-logo small { display:block;font-size:11px;color:var(--text-muted); }
    .field { margin-bottom:16px; }
    .field label { display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px; }
    .err-msg { background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:#ef4444;margin-bottom:14px;display:none; }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <div class="logo-mark">HF</div>
    <div><strong>HandyFix</strong><small>Admin Portal</small></div>
  </div>
  <div class="err-msg" id="errMsg"></div>
  <div class="field">
    <label>Email</label>
    <input class="form-input w-full" type="email" id="loginEmail" placeholder="admin@handyfix.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input class="form-input w-full" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button class="btn btn-primary w-full" id="loginBtn" onclick="doLogin()">Log In →</button>
  <p style="font-size:11px;color:var(--text-dim);margin-top:16px;text-align:center">
    First time? Run <code style="color:var(--gold)">setup.php</code> to create the admin account.
  </p>
</div>
<div id="toast-container"></div>
<script src="shared.js"></script>
<script>
// Redirect if already logged in
(async () => {
  try {
    const d = await HF.apiFetch('api/auth.php?action=me');
    if (d.user && d.user.role === 'admin') window.location.href = 'admin_dashboard.html';
  } catch(_) {}
})();

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('errMsg');
  const btn   = document.getElementById('loginBtn');
  err.style.display = 'none';

  if (!email || !pass) { err.textContent='Please enter email and password.'; err.style.display='block'; return; }

  btn.textContent = 'Logging in…'; btn.disabled = true;
  try {
    const data = await HF.apiFetch('api/auth.php?action=login', 'POST', { email, password: pass });
    if (data.success) window.location.href = 'admin_dashboard.html';
  } catch(e) {
    err.textContent = e.message || 'Login failed.';
    err.style.display = 'block';
    btn.textContent = 'Log In →'; btn.disabled = false;
  }
}

document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
